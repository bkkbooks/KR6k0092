body:
  text: 濮陽沙門智周撰輕垢罪頭從佛告諸菩薩言已説十波羅提木叉竟尾盡佛華光王品中廣説也將釋此經文前八門分別一制意二釋名三數類四以輕帶重五以一含多六遮性七粗細八會通一制意者六義一為令世間於佛弟子無譏嫌故二光顯佛子出世道故三微細情塵悉斷盡故四調伏三業滅三毒故五遠護十重前方便故六長養菩薩三聚淨戒故此六義戒戒通有務使毫微雜染一念不生清淨真心湛如空月故名無犯制意竟也二釋名者言輕垢罪者簡異十重名輕汙辱戒名垢罪者摧也即有二義一由犯戒故善神不護現令菩薩身心衰耗二負破戒業墮不如意處更令佛子身心摧折故名罪也約戒釋竟又體非是重名輕點汙淨行名垢約行釋竟菩薩善戒經地持論輕戒總名突吉羅瑜伽論四分律等翻名惡作惡説身犯名惡作口犯名惡説善生經中名失意罪釋曰謂忘念所作乖於本志故名失意釋名竟三數類者通論此篇與諸教類開合略出十例一若依瑜伽論有四十四種輕戒二若依地持善戒少有增減大同瑜伽三依菩薩內戒經四十二種輕戒四依善生經別有二十八種輕垢戒五依方等經除二十四種戒外別有二十五輕戒六依此經大數四十八輕戒其中含攝即近向百條七三千威儀經即三千條八依毗婆論及付法藏經説八萬毗尼又此經自指廣梵網本八萬威儀品當明九如梁攝論引毗奈耶瞿沙經説菩薩戒有十萬種差別十如大智論説菩薩戒略有八萬廣有塵沙等戒如是等一切三藏八藏更有種種差別數類總而為言皆是此輕垢等類也類數竟四以輕帶重此四十八中幾唯是輕幾兼於重今詳四十八中六戒兼重餘戒唯輕其六重一國使殺生戒於中為使故不應為而為輕垢故入此篇以殺生故兼帶重罪二放火焚燒戒中以焚燒故不應為而為輕垢入此篇隨火所損衆生命兼帶重罪三倚官乞求戒中不應恃官勢故輕垢入此篇強逼取他物入盜重攝四為主失儀戒中為主失儀入此篇損三寶物入重攝五違禁行非戒中以詐現親附等入此篇自謗三寶故入重攝又行殺盜故重以三長月六齋日犯故入此篇六畜作非法戒中輕稱小斗等入此篇取人財物等是重攝以輕帶重義竟五以一含多亦以少含多者四十八輕中幾唯一戒幾具多戒略有十戒各具多戒一於販賣中有三戒一賣奴婢二賣良人三賣棺材板木等二不能救生戒中有二戒一救生免殺二亡日説法以救亡苦三於輕求中亦有二戒一乖受戒儀式戒二法師倚恃不為答問戒四於惡伎損生戒中有六戒一賣男女色二自手作食自磨自舂三占相解夢四呪術工巧五調鷹方法六和合毒藥五於違禁行非戒中有四戒一密謗三寶二為媒三齋日殺生四齋日偷盜六於畜作非法戒中有六戒一畜刀箭等二輕稱小斗三因官勢取物四害心繫縛五破壞成功六畜養貓狸七於觀聽作惡戒中有五一不得看鬪二不得聽樂等聲三不得博戲四不得卜五不得賊使八於故入難處戒中有三戒一頭陀二布薩三坐夏各令如法不入難處等九於應講大乘戒中有二戒一教化他建立塔寺處二教災厄之時講説大乘十於受戒乖儀戒中有二戒一受戒乖儀二不敬禮俗結曰上來且十條內約文散説即三十五種又前門六戒內各有可含重戒亦各具二戒也自餘三十二戒各唯一種以此開張為論則有七十九戒以少含多竟第六遮性不同者於四十八戒中幾是遮幾是性至文點出云云遮性義竟第七粗細差別者於四十八戒中幾防身口幾防意業又幾是粗防惡業幾細防惑障亦至文點出粗細竟第八會通者如上七門及一切時聖教中廣略多少節級調伏斷除五住地惑名為三聚淨戒者此蓋是無上調御一切種智了達一切衆生深心所行能知一切法之所歸趣將護攝化一切衆生應病與藥令得復行一切戒品差別之相皆是隨宜方便而演説之若得衆生五濁鄣消五住惑盡則與如來同皈本源同一佛性同住光明金剛寶戒同坐華臺放戒光明普照一切如盧舍那佛無二無別故法華經云我本立誓願欲令一切衆如我等無異我昔可願今者以滿足化一切衆生皆令入佛道是其義也云云會通竟佛告諸菩薩言已説十波羅提木叉竟四十八輕今當説者述曰此是一釋迦説戒中分二一十重已如前竟二四十八輕今當説此文為三一結前生後二正顯戒相三結勸修學今初已説十重竟是結前四十八輕今當説是生後結前生後義竟就第二正顯戒相中四十八戒或分五段即如文有三十二九各指大經本品故或復各依本條例則四十八章此二分文任便取捨今依五段為宜以文中五節法勸故初三段各十戒出一結勸章後二段各九戒出一結勸章仍於此戒名數上各加初中後之三字其名曰初十中十後十二九者初九後九無中故分五段竟初十不得輕慢師長戒第一文前七門一制意二次第三釋名四具緣五闕緣六輕重七通塞初制意者菩薩唯應謙卑敬讓一切衆生況於師長輒有輕慢違行之甚故須制也制意竟二次第者善學佛子既物得戒宜須廣修諸行修行方軌要須師授佛子若懷輕慢師長教授無由若教授無由行業無憑而立故次十重先制不得輕慢師長戒也次第義竟三釋名者於師及長心輕身慢憍癡自居應以供給供養而不行之立制防此故名不得輕慢師長戒釋名竟四具緣者有四一是師是長是德人二知是師等三故起輕慢心四身不敬養即犯具緣竟五闕緣者闕初二緣並有小罪以於一切含靈皆須敬故闕第三緣得中罪以於師長身心不敬故闕後緣得上罪以於師長起輕慢心故闕緣竟六輕重有四種一約境有三品一於二師二於長友三於同類於此三境犯上中下罪可知二約心亦三品若以嫌恨心恚惱心犯上品二若無嫌恨等心但由憍慢癡心是中品三懈怠忘念是下品三約對以三心對前三境如此綺互輕重可知四約事亦三品一不能賣身等二不如法敬養等三不迎送禮等上中下三品可知輕重竟第七通塞者若夜黑暗煙雲塵霧中不相識二若睡眠時他覺想三若重病四若病新差無力五若在座説法六若正聽法護説者心皆無違犯如瑜伽戒本通竟若此經中一切不開通塞竟若佛子欲受國王位時受轉輪王位時者述曰此正釋不輕慢師長戒文分三別一先應受菩薩戒從初至諸佛歡喜是二標起長師令如法供養從既得戒已至而供養之是也又可前是佛子應受戒此是佛子應隨行結曰應受戒而不受應行供給而不行即是二戒同制也三違制結犯從若不爾者至犯輕垢罪是也就初文二一明應先受戒從初至應先受菩薩戒是二明受戒利益從一切鬼神至諸佛歡喜是也初明應先受戒略舉三位一國王是粟散王及諸封王位國帝不得執權衡者是如此國帝子帝孫封國王等二輪王即金銀銅鐵等各有數寶感應如前説竟三百宦通一切文武官等此三貴位於其衆生皆能損益若不受戒幽靈不護憑何威肅統領一切群生故云應先受菩薩戒也一切鬼神救護王身至諸佛歡喜者述曰此第二明受戒利益以受戒人上順佛意故諸佛歡喜下愜群靈故得一切鬼神救護令其身心無諸災厄職位長存既得戒已生孝順心恭敬心下至而供給之者述曰此第二標起師長令如法供養文分二別初標應供養師長從而菩薩下至而供給之是初標起師長中分三一生重心二見尊人三設敬儀初孝順心者報恩敬養為孝奉行尊命名順故云云恭敬心者謹攝三業名恭迎承禮拜名敬也生重心竟見上座和上至同行者述曰此第二見尊人略舉六種上座者但是一切衆集處為上首者是也二和尚者古師翻為力生道力由此人生故唐玄奘三藏義淨三藏同稱梵音塢波陀耶此翻親教師以此人親教弟子故有三種一十戒二具戒三菩薩戒和上謹撿詳諸經菩薩戒師有二種一冥師即諸佛菩薩是二顯師即人師傳法相宛者是以此經云二師應問七遮故以人師傳本釋尊為和上即還以傳法人師芤和上亦得故云云阿闍梨此梵短聲也翻為正行以此人糾弟子之行故涅槃經第八云阿闍梨者謂於世間有聖行者也唐二個如上三藏師長聲呼曰阿遮梨耶翻軌範師以為弟子作法則故六種不同一十戒二羯磨三威儀師四受業五依止六授菩薩戒云云四大同學者是同學大乘先受菩薩戒者五同見者同學大乘正因緣法中生正見者是如云不妄語戒中釋正見義竟六同行者如三世菩薩法友心同行者是也又見亦名解行亦進亦是或同師或不同師但取同見或解同進修大乘行乘者俱堪尊重又釋亦通小乘解行人亦堪尊重以究竟無別小乘一切同入大乘故故法華經四雖復説三乘但為教菩薩也而菩薩反生憍心慢心癡心下至而供給之者述云此第三設敬儀中違失明非也以生憍慢心故翻前恭敬心也以生癡心故翻前孝順心也又於師不孝於長不敬又不敬曰憍自大曰慢長憍慢故名癡也此是違行之竟也不起承迎禮拜者是違行之相也一一不如法有二一於前六位一一人所各不如法供養等二於一切所須物中一一各不如法等又通論有五種供養一身業承迎禮拜是二口業稱揚謙謝是三意業尊重孝敬心是四事物即七寶百物是五法供養即受持讀誦如法修行是今文無口業及法供養若通準上下文並皆具五種供養若實貧窮無財供者終無開許空不供養可以令自賣身通在家出家位賣國城約王位所統曰國所據曰城賣男女者是本誓願之男女故賣時無失所也又是菩薩重願願行至深故破生死恩愛於恩愛處捨而不著故賣男女成就行願也上二位約在家菩薩勇決持無著戒故賣國城男女七寶者有二種一金輪藏臣等寶七寶者一金輪寶玉女馬象珠玉兵臣主藏臣寶等以巳七寶十回向菩薩作世間金輪王王四天下先咸得後皆能捨成無著戒也又七寶者一金二銀三琉璃四頗梨五赤珠六車渠七瑪瑙此七寶十信十住十行已示粟散王等為成菩薩行願捨而不著成無著戒也百物者通一切所有或隨法師所須而供給之或賣易供給務令盡力無所慳惜一切供給自成菩薩行願若不爾者述曰此是第三違制結犯言若不盡力供養法師便成慳惜財寶自非於物無染無著清淨願戒無由得成然違本願心故唯結輕垢實慳相應即波羅夷輕則結薄重即增深輕重成𠎝隨心可解輕慢師長不供結戒竟不得飲酒戒第二文前七門一制意二次第三釋名四具緣五闕緣六輕重七通塞初制意者酒是惛狂之本損害之一切過患由酒而生故大智論云飲酒三十六失能造四逆唯除破僧為患之甚特應制斷制意竟二次第者前戒制外不供給今戒制內無惛亂故次第明也次第竟三釋名者飲是能防酒是所防能所俱故制名不飲酒戒釋名竟四具緣者有四緣成犯一是酒二起酒想三無重病文殊問經云一切藥不能治醫師言唯酒能治故開通也四酒一渧咽便犯以小乘諸律不通想疑錯等緣此義故有酒想故今文云若佛子故飲酒明知有酒想方犯五闕緣者如上四緣一一闕者或皆開通無犯縱犯亦輕闕緣竟六輕重者有三一約境二約心三合辨一約境者即酒醇醴醨薄境竟二約心者即飲人少時多時長時又一一時中少分多分全分又一一分中自飲教他讚歎隨喜一一心念隨心輕重結業不同約心竟三合辨如前心境相對四句説之一長時飲酒心對染一切酒境此業最重二少時心對少境此業最輕三半長半少時心對半好半惡境此業處中四非長少時心對非酒境此與無記恆心心相應亦可名持戒無犯也餘自飲教他等四位作句可以義準輕重竟七通塞者如文殊問經同上引者是也又為救他生命難及自身命難為存生命成菩薩行又如末利夫人經為救彼無間業人故與同飲歡致息重業此皆開通理亦無犯亦是菩薩以衆生病是故我病衆生病愈我病即愈有心佛子一一隱心能於病行無染無著或方可行之矣通塞竟若佛子故飯酒而生酒過失無量善者述曰此不飲酒文分三一舉酒過文云故飲酒下至無量是也二出犯相文云若自身手下至衆生飲酒是也三違制結犯文云若故自飲下是今初舉犯過者而此經本傳來既久有本云故飯酒而生酒過失無量又有本云加一善字云失無量善學者應知今依失無量善本釋之言故飲酒者簡癡犯無故也失無量善者以過多多故一切善失也若自身手過酒器與人下至及一切衆生飲酒者述曰此第二出犯相分二先出過酒器相次出飲酒相今初言若自身手過酒器與人飲酒者五百世無手者此舉輕以明重舉淺以況深過器是輕是淺猶五百世無手若自飲教他飲定當多劫墮況梨也何況自飲下至衆生飲酒者述曰此第二正犯相正是以輕況重文無讚歎隨喜理有略無酒過之相如前酤酒戒説若故自飲下至輕垢罪者述曰此第三違制結犯經言一切衆生皆有佛性皆受得戒若教他飲酒皆發惛狂塞他明達之慧由此尤故酒制也不飲酒戒竟不得食肉戒第三文前七門同上初制意者凡為菩薩者只合捨自身肉濟一切命何容斷大慈種作衆生怨食他血肉非理至甚故須制也制意竟二次第者前離惛亂之飲今離損命之食故次生也次第竟三釋名者佛子是能食之人血肉是所食之味立制防此故名不得食肉戒釋名竟四具緣有四一是肉以非肉無犯故二是他肉以食自肉無正犯故三起肉想以錯誤無犯故四入口成犯具緣竟五闕緣者如上緣中闕一一緣或輕無犯可解闕緣竟六輕重者分三一約境二約心三合辨初約境者有四一如一切胎衣是無命肉二自死鳥獸殘肉三淨肉不見殺不聞殺不疑殺小乘教中為淨肉也四見聞覺知處分殺等肉論犯四種並同論業如次能輕後重境竟二約心者就惡心中分三少時多時長時食肉心等就一一事中少分多分全分食肉一一分中各有自食教他讚喜等食肉心如是等心造業輕重思之可解約心竟三心境合辨者輕重四句類前説之得罪輕重可解合辨竟七通塞者約別教三賢位人以不見機一向皆塞初地以上見機而作或以食肉因緣令諸衆生發菩薩意成菩薩心斷惡生善破惑見理故應為之通塞行竟云若佛子食肉下者述曰此不得食肉戒文分三一舉不食肉意文云從佛子下至不得食一切衆生肉也二明食肉得無量罪文云即章一勺是三違制結犯文云若故食者犯輕垢是今初為二先舉不食肉意從初至而捨去是二制斷文云一切菩薩不得食一切衆生肉就前先標起不得食肉如文一切肉不得食也次釋不得食肉意文云斷大慈悲佛性種子一切衆生見而捨去故謹按入楞伽經斷肉品中有十義故不得食一切衆生肉文廣不出此斷大慈悲種子是一意衆生捨去又是一意又一涅槃經云一切衆生見食肉人悉皆怖走咸言此人是我等怨又諸經説食肉人口四邊連頭常有血肉光或時令衆生得見所以怖走楞伽悲華大雲一切智光仙人經涅槃經等廣説斷肉善學佛子於心行之於事無令漏失一切菩薩不得食一切衆生肉者述曰此第二制斷食肉也食肉得無量罪者述曰此第二論食肉罪報如論經中同説食肉之人一者短命二多病乃至貧窮諸衰以自莊嚴故云云若故食者犯罪者述曰此第三違制法犯也不得食五辛戒第四文前七門同上初制意者凡諸佛子理應香潔其身奉事一切賢聖何有食噉五辛臰氣𤑫㶿薰坌賢聖善神捨離惡鬼侯授故須制也意竟二次第者前戒制有命之身分此戒制無命之五辛故其次也次第竟三釋名者能食佛子為能防五辛色類為所防立制遮斷故名不食五辛戒也又惡習嗜欲為能防葷辛種類為所防能所雙制故名不食五辛戒也名竟四具緣有四一是五辛二起彼想三無開緣若重病救命見機度生等開四入口便犯具竟五闕緣者如上四緣一一闕者戒輕無犯可解闕竟六輕重者約境有生熟氣有潑盛心有欣厭耽捨輕重三時三分四位類前可知輕重竟七通塞者若自重病更無藥治見機救生利益安樂理應並通非此等緣一切皆塞通塞竟若佛子不得食五辛下者述曰此正是不食五辛戒文分三一標不得食五辛文從初至興渠是二正唱制斷從是五種至不得食是也三違制結犯從若故食下至犯罪是也今初標不食中先標五辛次列五數今初不食五辛者總標也大蒜茖蔥慈蔥蘭蔥興渠者列數也此中五辛與五辛經及諸處色數有別諸處以薤薢蔥蒜興渠為五今經革蔥者相承是山蔥也諸山人言臰於人間蔥也慈蔥者胡蔥是也蘭蔥者人家園中種者是興渠者有説藝薹是有説阿魏藥樹是又説海南山中自有興渠臰穢難近大蒜人所常食可知云云是五種一切食中不得食者述曰此第二正唱制斷也若故食下者述曰此第三違制結犯也不食五辛戒竟不得不教悔罪戒第五文前七門同上初制意者若佛子見一切犯戒之人應方便曉喻教令懺悔復本清淨即是自利利他正法久住而乃捨四等心棄本誓願不教一切犯者懺悔而同住同利此則令法門塵垢同法義虧自行不成清濁同事三聚正因不立攝生之義令乖非菩行故須聖制意竟二次第者前則自清己身今戒不與雜穢惡行者同事故次制也次第竟三釋名者一切犯戒名有罪而菩薩不教悔過名無慈自他俱非清濁同事戒防此失故云不教悔罪戒又若佛子不以慈悲教授一切名不教懺悔乃令一切犯戒之者現種惡因當受惡果立制防此故云不教悔過戒名竟四具緣有五一是犯戒衆生二知彼有罪三無別開緣四無慈悲故覆藏彼罪五共同法利便犯具竟五闕緣者隨闕如上一一緣或輕無犯闕竟六輕重者犯五八戒者不教悔過教義名輕犯十戒具戒七逆等不教悔者長劫受苦彌成菩薩無慈悲甚故重又若以理論諸法平等戒隨情別菩薩違理不教一切悔過如今戒結一一同犯輕垢也輕重竟七通塞者自無五德十德他不信順理通無犯若實有德輕心慢心不教悔過此則無慈故塞通塞竟若佛子一切衆生犯八戒下者述曰此不教悔過戒文分三一標起一切犯戒應教懺悔從初至應教懺悔是二出不教懺悔共同法利從而菩薩至一衆住説戒是三違制結犯從而不舉至犯罪是今初先列一切犯罪相從初至一切犯戒罪是次應教懺悔文如章門今初八戒五戒十戒此三種戒若小乘中通道俗受此已上十戒即十善戒故若以十戒為沙彌戒者即唯道非俗即是今經十重通六道一切受得毀禁者沙彌十戒中煞盜淫犯者禁為毀比丘四重尼八重此經十重犯者並名毀禁云云又犯一切制戒不同輕重皆名毀禁七逆者如後戒説之八難者古師云是三塗八難解曰此八難是生死人受報之處非是舉罪懺悔之因故不用今準地持論中説菩薩戒有八重法與今經十重大同而菩薩犯八重者生八難處即以八重八難之因令菩薩舉處懺悔因中説果故名八難也云云一切犯戒罪應教懺悔者述曰此次明應教懺悔云云而菩薩不教懺悔同住同僧利養而共布薩一衆住説戒者述曰此第二明菩薩作而不作不教懺悔不應作而作同住同僧同利同説戒是云云問曰如受五戒八戒人此是俗人何處得與菩薩同住同利説戒耶答此有兩解一但受五八戒人不樂聽聞菩薩戒即如來問不與菩薩同住説戒若是有情心信向大乘難受五八戒而欲聽聞菩薩大戒佛亦開許故上文云但有心向戒解法師語皆受得戒皆名第一清淨者又本業經云菩薩法師先為其人讀誦解説令心開意解然後為受故但受五戒八戒人亦得與菩薩同住説戒也云云布薩者此翻長養淨法佛令弟子半月半月修撿自身心有犯戒亦慚愧懺悔長養成就清淨行業故名布薩云云而不舉其罪下至犯罪者述曰此第三違制法犯不教悔過戒義竟不得不供給請法戒第六文前七門同上初制意如涅槃大品經同説云諸佛所師所謂法也以法常故諸佛亦常是故諸佛供養恭敬尊重讚嘆所以法在人尊有法人重故便捨憍慢除倨傲百里千里迎來送去六時請法乃至為法滅身而菩薩反縱憍慢生患惱心倨傲於人輕侮於法失法利甚故須制也意竟二釋合後名者慳蔽自纏名不供給輕人慢法故不行請大聖哀愍制戒防之故名不供給不請法戒亦名不尊人戒法不孤運弘之在人人不自成要資法立心懷我慢自大貢高故名不敬法鄙吝所須故名不重人財法路塞良為慳慢戒防此失故名不敬法重人戒名竟三次第者前戒於犯者不教悔過今戒於有德者輕人慢法故相次生也次第竟四具緣有四一實是大乘見行人二無別開緣三起慳慢心四不供養請法便犯具竟五闕緣者若是小乘不同見不同行人即闕第一緣餘緣闕者可解闕竟六輕重者約人有三一解行過已堪為軌範而不敬請應重二解行同己人不敬請少輕三解行劣已無犯人竟約法者若實解大乘常住經律人不敬請則重若大小乘各半解半未解人不敬請稍輕若唯解行小不解大乘者無犯法竟七通塞者若菩薩慧眼法眼開發知時非時善識人達法理通無犯未至此位一切皆塞故華嚴十方補處菩薩亦皆請法也通塞竟若佛子見大乘法師下者述曰此不供給請法戒文分三一明制戒緣從初至千里來者是二正明制戒從即起至滅身請法是三違制結犯若不爾者是今初見大乘法師者此總標大乘異小乘學人也大乘同見同行者以大乘學人見行不同以不同故今文別簡出取同見行者來入僧房舍宅城邑即應供請也百里千里來者明為弘宣大法故遠來傳授也即起迎來送去下至滅身請法者述曰此第二正制戒日食三兩金請法重人故舉寶物中重者金是故云日以三兩金供養又以傳法師替補佛處説佛教誡故消此供養如謗佛經中説謗佛罪輕謗法師罪重若供養法師則為供養佛等法華經法師品説若人一劫謗佛其罪尚輕若人須臾罵受持讀誦法華經者其罪甚重由此言之以凡夫法師佛處處大乘中説敬法重人如未曾有經諸天脫天衣上服為座請野干和上説法涅槃經雪山童子為求半偈許捨身命供養羅剎大品經薩埵波崙菩薩行打骨髓為求般若如是等説菩薩敬法重人不惜身命故此經文為法滅身請法是也日日三時供養請法師三時説法三時禮拜者述曰為菩薩者自未證真法身未立居地前位理合有疑即聞見勝便請亦何限時節或三或六若入初地已上一一念中問十方佛及大菩薩一切法義此三時者制住四十心位人未能於念念中問法請益且制今日夜各三時即日朝中晡即初夜中後故云三時以住居凡位制令不生瞋心患惱之心為法滅身請法也若不爾者述曰此第三違制結犯不敬法重人戒亦名不供給戒竟不得懈怠不聽法戒第七文前七門同上初制意者凡諸佛子應持經律詣講法處聽受咨問以自資神益智成法身慧命而乃懈怠懶惰應往不往應聞不聞長己無智減損慧命故勞聖制意竟二次第者前戒令請大法今戒令聽大法故次來也次第竟三釋名者有講法處成立法身心懷懈怠不往聽受聖防此失制戒禦之故云懈怠不聽法戒名竟四具緣有四一是新學二有講法處三無別開緣四不往聽受便犯具竟五闕緣者類前可知闕竟六輕重者約人有三一大小俱講二講大不講小講小不講大前二重後或無犯若受威儀戒如來制後亦有犯故輕重竟七通塞者若自知法身慧命既成立則通餘並塞通塞竟若佛子一切處有講法毗尼下者述曰此懈怠不聽法戒文分三一舉戒緣從初至有講法處是二正制從是新學菩薩至聽受是三違制結犯若不至下是也今初一切處有講法毗尼經律者述曰講法兩學總通一切佛法毗尼者此翻為滅能滅五住煩惱即大乘中説滅能滅一切煩惱義也若以小乘有漏木叉能滅身口七支惡名為滅者此約威義戒釋也若定共戒道共戒能滅九十八使者此小乘無漏戒也經律者通一切大乘經律也若菩薩曉了己身有佛性戒故如涅槃經住實智用權智者則不與一切小乘而相違背雖聽學小乘而知是佛權智攝誘一類終歸大乘而學佛方便即不犯次後背大聽小戒若不得此意即犯背大向小戒也是新學下至聽受者述曰此第二對緣正制也若不至彼下述曰此第三違制結犯懈怠不聽法戒竟不得背大向小戒第八文前七門同上初制意者為菩薩者住十信之位十住之位名習種性人唯捨邪法皈正法背小乘入大乘今乃捨正皈邪棄大習小本原種性遂被塵蒙佛子之行頓成乖僻違行之甚故勞聖制也大般若經戒品云若菩薩設殑伽沙劫受妙五欲於菩薩戒由不名犯若起一念二乘之心即名為犯意竟二次第者所戒令離懈怠制使勤學今戒制不許學習二乘外典故次來也次第竟也三釋名者不了己身有佛性故背大不別權實教義故向小能所合目故名不得背大向小戒又不善習應常住種性故背大不別邪正是非故習外立制防此故名不得背正向邪戒亦名不得背大習邪戒名竟四具緣有四一是大乘法二起彼此想三心背言非四捨大受小便犯背大向小向外亦爾具竟五闕緣者例上釋之闕竟六輕重者約境者大乘有隨轉理大乘如十二部中四阿含經中説三無數劫修道百劫修相好三十四心入相成佛等是名隨轉大乘以此經中不説一切衆生皆有佛性故二常住大乘即事嚴此經一切般若方等經法華涅槃等是名常住大乘以此等經同説一切衆生皆有佛性凡有心者皆當成佛背此等經名心背大乘常住經律也故重約心者凡夫癡暗心性不定或泛爾迷或信心隨緣則轉疑猶豫不決故轉以心退轉故背大向小向邪如是轉迷疑生背則輕轉信生背則重種種廣説輕重竟七通塞者若聖種性未成法身未立一切皆塞反上則通通塞竟若佛子心背大乘常住經律者述曰此背大向小戒文分三一背大從初至言非佛説是二向小向邪從而受持至邪見輕律是三結犯如文今初心背大乘常住經律如前釋訖言非佛説惡習熏心故言非佛説此據初習二乘邪見人未見邪見惡見可以結輕若成邪惡見即是謗法如上結重而受持二乘聲聞外道惡見邪見經律者述曰此是第二向小向邪也二乘者即聲聞緣覺乘法唯説無常苦空無我不説常住佛性故言外道者如西國九十五種外道此國數種外道等法皆不得習學恐成惡見邪見故惡見邪見與諸惡雜染同趣故名惡見執著斷常名邪見故言外道法律是惡見邪見經律也又學殺牛殺羊祠天願得生天等法故名邪見經受行雞狗等戒名邪見律又學斷常二見撥無因果等法名邪見經律又行服氣服水等法名邪見律故名邪見經律也犯輕垢罪者述曰此第三違制結犯背大向小戒竟不得不看病戒第九文前七門同上初制意者凡稱菩薩以慈悲喜捨為體拔苦與樂為用何有見病不救乖體失用聖防此失故須制也又諸疾病人愛惜性命恐死墮落佛子慈忍供給可須説法安慰愛養令差即是施與長命色力安無礙辨頓違此行故須制也又不受長者請經云佛自看病比丘洗浣説法告諸比丘汝等捨父母兄弟唯有師僧同學何不相看種種呵已現金色身皆從看病因緣故來何況凡下意竟二次第者前戒為背勝上法故制今戒為捨悲愍故制又前戒於法違背故制今戒終生不濟故制次第竟三釋名者病苦鄰死捨而不看能所合利故名不得不看病戒名竟四具緣有四一病苦二起彼想三自無病四起嫌捨去便犯具竟五闕緣六輕重七通塞並類上思之若佛子一切疾病人下者述曰此不看病戒文分二一舉緣從初至皆養令差也二舉違行結犯從而菩薩下乃至輕垢罪是今初一切疾病人供養如佛無異者述曰舉上比下故云如佛無異言使菩薩心行平等於八福田無二無別故云病人如佛無異此令以理觀小心看病也八福田第一者述曰八福田者有人云一曠路造美井二水路造橋梁三平治險路四孝養父母五供養沙門六供養病人七救濟危厄八設無遮會未審出何聖教又有人云三寶為三四父母五師僧六貧窮七病人八畜生亦未見聖教文又賢愚經施五人得福無量一知法人二遠行來人三遠去人四飢餓人五病人加以三寶亦名八種福田今依本經戒中自有八種福田三寶為三四父母五師僧六弟子七諸根不具八百種苦以此義故從初舉佛子平等心看病人與佛無異者是也又不受長者請經云佛自看病洗浣病者及洗衣物曬褁訖集諸比丘種種呵責説法已告諸比丘佛法僧寶無可須待一切病人有所須待要人看待然可得差故看病福田於八之中最為第一而菩薩下者述曰此第二舉行以制若佛子於一切病者先有嗔恨心今應捨嗔恨心而行救濟若懷嗔恨心不救濟者失慈悲之行成怨結之業故犯即輕垢罪是也不看病戒竟也不得畜諸煞具戒第十文前七門同上初制意者菩薩唯應廣積財法利樂衆生而反畜殺具深乖慈忍故須制也意竟二次第者前戒防自身不能濟病今戒防非法煞具唯行慈濟故次來也次第竟三釋名者煞具損害畜長嗔怒違慈既深立制防此故名不畜煞具戒名竟四具緣有四一是煞具二有彼想三無開緣四故畜成犯具竟五闕緣六輕重準上説之七通塞如涅槃經第三金剛身品云於末法中初護正法令與優婆塞等執持刀杖而相隨逐口常宣説方等大乘一切衆生皆有佛性當知是人不名破戒名護法師此通也又一切人施者口應報云出家人法所不應畜檀越回易如法布施其福甚多或未回易間暫時隱處安置亦應無犯餘一切皆塞過塞竟若佛子不得畜一切刀杖者述曰此不畜煞生具戒文分二初戒緣從初至一切不得畜是二舉違行結犯從而菩薩下至犯罪是今初為二先舉一切煞具從初至殺生之器是二制斷如文一切不得畜是而菩薩下者述曰此第二舉違行結犯菩薩斷怨行乃至煞父母尚不如報況故畜刀杖者結犯不畜煞具戒竟如是十戒應當學敬心奉持者述曰結前十戒勸學奉持也下六品中當廣開者述曰此是以今本之略指大本之廣故云下六品中廣開也結前竟也不得故作國賊戒第十一文前七門同上初制意者菩薩理應和諸違諍令息相害而反作國賊令興師相煞者為害滋甚故勞聖制又別意有六一招彼此譏嫌故二兩發怒害故三兩成乖諍故四興師相伐故五非四等行故六業道深重故為此傷故須制也意竟二次第者前戒制畜煞具今戒遮為軍使故次第也次第竟也三釋名者為國傳語名國賊兩軍相合或名相煞立制防此故名不住國賊戒亦名不作兩國通使戒釋云鯨敵勝負名兩國傳彼此語名通使戒互覘盈虗興師相伐制戒防此故名不作兩國通使戒名竟四具緣有四一二國二軍二有惡心為利養三傳彼此語四彼此知聞便犯若令兩國相煞傳者有煞心一一人死即犯煞戒夷罪又犯兩國通使輕垢罪具竟五闕緣六輕重準上説之七通塞者若菩薩住不思議解脫神通力用立之以等力降伏使和安者來往並通餘皆塞也通塞竟若佛子為利養述曰此不作兩國通使戒文分三一戒緣從初至無量衆生是二正制戒從而菩薩至故作國賊是三違制結犯若故作下是也今初為利養者望得賞賜故又望爵祿故惡心者或自有惡心或為親識國家作報怨心是惡心故云通國使命命興興師師者衆也帥也謂帥衆人煞無量衆而菩薩不得入軍往來者述曰此第二正制尚不得往來況故作國賊也若故作者述曰此違制結犯故作國賊戒竟不得作販賣戒第十二文前同上初制意者菩薩唯應捨身命財捨而不著財法二施周給一切不可內懷貧利外行販賣或因此行枉押埋沒煞盜之業潛興自行既虧招他譏謗雜染之甚故須制也意竟二次第者前戒止為國賊故制今戒遮販賣良人六畜等物況於諸色埋沒故制故次第也次第竟三釋名者衒誘規利故名販賣立制防此故名不販賣戒名竟四具緣有四一是犯境有四一良人二奴婢三六畜四盛死之具二隨起彼想三正賣四事成即犯具竟五闕緣六輕重準上七通塞者若小乘諸部經律為三寶建立修持聽畜良人奴婢六畜等使用若別人不許唯以出家五衆為三寶事直買直賣無心販易理通餘並塞盛死具者諸佛教中唯有水火林三葬終無許用盛死人具何況賣販行非法耶通塞竟也曰若佛子故販賣下者述曰此不販賣戒文分三一舉犯緣從初至盛死之具是二正制從尚不至教人作是也三違制結犯從若故下是也六畜者述曰俗書周禮云牛羊犬馬豕雞為六此隨世言六理實無六畜通一切畜生皆不得販若販賣者即是十六惡律儀攝故不販賣戒竟也不得無根謗毀戒第十三文前同上初制意者有四一為護十重中説謗毀他等三重戒故二為令不惱諸好人故三為護佛法無醜惡過失故實惡尚不許説何況虗起謗耶四為離招重業纍故意竟二次第者前戒於下利不貪故制今戒於上人無謗故制次第竟也三釋名者非見聞疑等惡事名曰無根枉惡熏心而語名謗立制防此故曰不得無根謗毀戒名竟四具緣有四一境實好人二知無惡事三起惡心四發言謗毀便犯具竟五闕緣六輕重同上七通塞若癡狂心亂又初地以上見機而逆化之可通餘並塞通塞竟也若佛子以惡心故者述曰此不得無根謗毀戒文分三一舉過從初至十重是二舉勝立制從父母兄弟下至慈悲心是三違制犯結從反而至垢罪是今初以惡心者明用三毒七毒或怨嫌心或諍名利眷屬勝他等種種惡心皆是起謗之因故云云無事謗他者述曰即是元無見聞疑三根等事故云無事惡狂重心而語故曰謗他此兩句是總餘良人至貴人等七種父母兄弟六親是別若廣説者即應以上一句歷一十七種人一一皆言以惡心故無事謗他言犯十重此句亦總文不次義如是七逆如下釋十重六親孝順慈悲等並如上釋章門云舉勝立制者以父母兄弟境上孝心易成故又對餘境亦同父母故而反更加者述曰此第三違制結犯不無根謗戒竟不放火損燒戒第十四文前同上初制意者護煞盜罪惡心放火連炎蔓莚損害深廣怨嫌極深大聖哀愍故立制也意竟二次第者前戒不令損惱人故制今戒不令損依報故制故次第也次第竟三釋名者放火起炎名曰損燒立制防此故名不放火損燒戒名竟四具緣有四一山等境二起彼想三以惡心四放火便犯具竟五闕緣六輕重七通塞準上説之若佛子以惡心故者述曰此不放火損燒戒文分三一舉過從初至九月放火是二舉損正制從若燒他人至不得故燒是也三違制結犯從若故下是也今初云以惡心者簡非慈心救物也放大火者簡非小緣錯誤也燒山林曠野者此明所損彌廣也四月乃至九月放火此是約時明損生惱害尤多以從四月乃至九月方寸之地有多生今故舉制也若燒他人家屋宅者述曰此第二舉損立制以燒山野元是無主火隨風勢燒他人家屋宅城邑乃至一切有主物故云不得故燒此正立制若有主無主山野並不得燒若故燒者述曰此第三違制結犯不放火損燒戒竟也不得邪僻教他戒第十五文前同上初制意者菩薩唯應以大乘教化一切衆生令速成佛乃以惡心嗔心教他二乘外道邪僻之法外道名邪二乘名僻流轉生死不達其本源故須制也意竟二次第者前戒遮其外損今戒護其內益故次來也次第三釋名者外道法邪二乘法僻佛子以此施他有損自他立制防禦故名不邪僻教化戒名竟四具緣有四一所對人二以惡心三教二乘外道法四前人領受即犯具竟五闕緣六輕重七通塞準上若佛子自佛弟子者述曰此不邪僻教化戒文分二一應教化以大乘之法從初至次第法用是二教化邪僻之法結犯從而菩薩至結罪是今初及外道初入佛法佛子應以慈心教以大法教解義理者述曰法界法性名大乘理佛種佛性是大乘義並如上廣釋也使發菩提心以解義理故傷輪轉發大誓願斷惡修善名菩薩心發十心者有本云發十發趣心俱得長養心即十長養金剛心即十金剛並如上釋一一解其次第法用如是三十心位一一位皆有體用自行化他讚喜等次第法用並如上釋而菩薩下者述曰此第二教以邪僻結犯亦名教以二乘外道法故結犯惡心瞋心二乘外道邪見論等並如上釋言橫教者以二乘外道法不正入佛法之義教授他人故名橫教也不邪僻教化戒竟不得惜法規利戒第十六文前同上初制意惜法有四一畏他勝己故倒説二規他利故倒説三或求他五欲色境故倒説四罔冒他故倒説此等皆是初心菩薩塵垢故勞聖制又制此戒為護前慳法重戒又為攝護新學佛子令入大乘正法故又為令説者聽者俱成大乘種性傳燈不顛倒故意竟二次第者前戒應教而不教不應教而教故制今戒為惜法規利不應時而説故制次第竟三釋名者吝護正法名為惜法內規利養名規利戒防此失故名不得惜法規利戒名竟四具緣有六一有來求法二實自解法三無開緣四規他利五倒説法言六前人聞知即犯見竟五闕緣六輕重七通塞準上若佛子應好心者述曰此不得惜法規利戒文分三一先制自學從初至解義味是二制教他學從見後新學至開意解是也三違制結犯從而菩薩下是今初應好心簡不是求利雜染等心也先學至義味是自學成立也見後新學下至心開意解者述曰此第二制教他學有百里千里來求大乘經律應如法為説有事有理兩種如法如燒身臂指等行此難行能行難作能作此事如法為説也理如法為説者即是教諸新學菩薩觀身觀一切衆生一切賢聖一切法亦如也衆生聖賢亦如夫如者不一不異平等無二如是心心寂滅念念真如住正法故亦不分別自身他身自事他事自行他行遠離恐怖身心豁然與真應名理如法為説戒淨名曰夫説法者無説無示其聽法者無聞無得此即標事理兩種如法為説竟為説一切苦行下者述曰此是釋事理兩行為二先釋事行次出理行今初苦行燒身臂指供養凡聖者以菩薩心住平等清淨法界觀心佛衆生一如無二如以真如心而行行苦行捨身臂指所以虎狼獅子餓鬼畜生而無差別平等施與而供養之事如法竟云若有一一次第為説正法使心開意解者述曰此第二釋理如法應教新學菩薩展轉為一切衆生説次第道平等道名正法使心意解也故華嚴經曰如心佛亦爾如佛衆生然心佛及衆生是三無差別差別無差別一一次第道諸戒平等是無差別差別平等道中迷悟深淺是佛依二諦為衆生説於佛真如清淨常一也而菩薩為利養故者述曰此第三違制結犯言為利者情有規求應答以大乘事理苦行如次前説故云應答乃以小乘雜碎事行非平等理行而説者故云不應答也説經律文字無前無後謗三寶説者述曰先簡非次顯是初簡非者有人云以小乘戒定慧門不以先戒次定後慧為倒説經律文字彈曰此是聲聞二乘法今經若教他二乘經律犯輕垢罪一非又師云為人説法前後一者中著前後令乖義理謗三寶説是佛所説則為謗佛言法如是則為謗法復云僧同此説則是謗僧議曰此解有通有塞塞者不簡説大小二乘教又不簡大小二乘謗三寶心口是何心口故是塞通者一往通望名教作義示有通簡非詳識竟也次顯是者略作三義釋之一約教位釋不謗三寶二約修行釋不謗三寶三結會不謗三寶初約教位不謗三寶者如涅槃經云若人八恆河沙諸佛所發菩薩心然後始能不謗三寶正法又涅槃第三十七迦葉菩薩品云若人心口異想異説言一闡提得菩提者當知是人謗佛法僧若人心口異想異説言一闡提不得菩提是人亦名謗佛法僧若引説言八聖道分凡夫所得是人亦名謗佛法僧若有説言八聖道分非凡夫得是人亦名謗佛法僧若有説言一切衆生定有佛性定無佛性是人亦名謗佛法僧是故我於戒經中説有二種人謗佛法僧一者不信瞋恚心二者難信不解故善男子若人有信心無有智慧是人則能增長無明若有智慧無有信心是人則能增長邪見善男子不信之人顛恚心故貪癡慢等例準瞋心説言無有佛法僧實信者無慧瞋倒解義令聞法者謗佛法僧善男子是故我説不信之人瞋恚心故有信之人無智慧故是人能謗佛法僧寶已上涅槃經文不添入語除注議曰經言心口異想異説者以是凡夫心想見倒以自覆蔽故名異想由想顛倒熏動口業故名異説是故名為心口異想異説能謗三寶也正約信者十信十住第六正信住以前遇惡因緣退者無惡不作能説異法能謗三寶遇善知識進入第七不退住常以般若圓明自照故説法化人不謗三寶乃至妙覺三十六位人説法教化一一皆能稱法界法性不謗三寶廣如仁王本業二經明之約教位釋竟二約行者十信位人還以信進念定慧回不護戒願等十心為進修之行若佛子信三寶性相常住無變生死輪轉猶如循環如是生死異動不動異自行教化此別教菩薩修行信心也若觀生死即而生信心了了分明通達生死空寂即是無二無別如是自行此信教他讚喜等此是圓學菩薩修行信心也進念定慧等九法修行一一皆有別圓二種行唯以義可論結會謗不謗義也約修行不謗三寶竟三結會者涅槃云有信無慧能謗三寶有慧無信能謗三寶者此等經自釋云有慧無信增長邪見以瞋恚心故謗佛法僧有信無慧顛倒解義令聞法者謗佛法僧故云心口異想異説皆謗三寶此多約別教別相信慧不融故云謗三寶是也若菩薩如華嚴十無盡藏品説信一切法性相常住不生不滅同真際等法性若菩薩住是信者所有慧身不從他悟信慧圓融一體一相能以自行化人者真名不謗三寶結會不謗三寶竟不惜法規利戒竟不得依勢乞求戒第十七文前同上初制意者菩薩理應謙下無礙利生益物而反倚恃乞索打拍橫取錢物違慈之甚故須聖制又別意有三一護前盜戒故二乖自慈濟故三倚勢恐他失所化故意竟二次第者前戒他來求法倒説成謗故制今戒非分倚勢惡求多求故制故次明也次第竟三釋名者假託官力名倚勢惡取無厭名乞求立制防此故名不得倚勢乞求戒名竟四具緣有六一為自名利二故近官等三倚威勢四逼惱他人五惡乞他物六人入手便犯具竟五闕緣六輕重七通塞準上説若佛子自為飲食者述曰此不得倚勢乞求戒文分四一自行惡求從初至多求是二教他惡求文如章是三無慈孝心文無慈孝心是四違制結犯文不倚勢乞求戒竟不得無知解作師授戒戒第十八文前同上初制意者菩薩理應內成己德外益他人而乃內實無知外欺一切詐為知解故勞聖制也意竟二次第者前戒倚勢強乞故制今戒詐言知解故制相次來也次第竟三釋名者隱無知解詐言知解為人師範自誑誑他立制防禦故名不得無知解作師授戒戒名竟四具緣有四一隨不習學二性非愚癡三隱迷詐解四與人授戒犯具竟五闕緣六輕重準上七通塞者若癡狂心亂立性暗鈍勤學未成又如法為説千里內更無人為戒師救彼死畏病苦應告他云某甲隨力隨分而説受者通也餘並塞通塞竟若佛子學誦戒法者述曰此不得無知解作師授戒戒文分三一制學知解從初至佛性之性是二實無知解從而菩薩至解一切法不知是三違制結犯從而為他人作師下是今初制學知解戒法者謂一法即是光明金剛寶戒是名戒法若三法即三聚淨戒是名戒法若二法即戒體戒相體者從師頓受得是相者十重八萬略則四十八是如是準本業經三聚淨戒攝受一切佛法故須日日六時持菩薩戒解其義理佛性之性義者十重八萬所詮之義理者凡聖本源清淨之理學習知解如此義理名為佛性之性義也而菩薩者述曰此第二實無知解文分三一實自無知解從而菩薩至戒律因緣是二欺誑自他從詐言至他人是也三結自無知解從一一不解至不知是而為他人作師者述曰此違制結犯去聖時遠人多嬉犯自他俱墮如何出離也不知解作師授戒戒竟不得鬪遘兩頭謗欺賢人戒第十九文前同上初制意者菩薩理應見人少善便稱讚也何乃內懷惡心兩舌欺謗積亹由此無惡不造大聖哀愍故須制也意竟二次第者前戒自無知解故制今戒謗他賢人故制故次來也次第竟三釋名者兩舌來往故名鬪遘兩頭矯設端緒故名謗欺賢人立制防禦故名不得鬪遘兩頭謗欺賢人戒亦名不得兩舌戒亦名不得離間戒名竟四具緣有五一內有惡心二見他惡行三謗以惡言四矯傳彼此五彼此作惡便犯具竟五闕緣六輕重七通塞準上若佛子以惡心故者述曰此不得兩舌戒文分三一敘制戒緣從初至菩薩行是二制戒意從而鬪遘至不造是三違制結犯從若故作下是今初以惡心故者種種嫉妬心欺陵心憍慢勝負心朋黨愛見心不省己過心常訟彼短心如是纏縛相應心皆是惡故見持戒至行菩薩行此是賢人以惡心者見生欺謗故名制戒緣也而闕遘至不造者述曰此第二制戒意佛意不許行兩舌令彼此造惡故若故下者述曰此第三違制結犯不鬪遘兩頭謗欺賢人戒竟不得不救衆生苦戒第二十文前同上初制意者菩薩初發心時救度一切衆生而乃見他殺害無救度心違慈行甚故制也意竟次第者前戒見賢欺謗故制今戒見生不救陷他受苦名生苦難能所合目故名不救衆生苦戒名竟四具緣有四一內無慈濟二見人殺生三捨而不救四命斷及不講戒便犯具竟五闕緣六輕重七通塞準上若佛子以慈心故者述曰此不得不救衆生苦戒文分三一制應作從初至生生受生是二應救應講從若見世人至生人天上是三違制結犯若不下是今初應作者菩薩以無緣慈悲觀三界六道捨身受身同稟四大若殺彼者即是我身本體以其一性一相一體一用一行一位一因一果平等平等無異身我本體者相續行殺生業故若見世人者述曰此第二應救應講或先救次講或先講次救隨便宜行要以慈心救令於怨親平等平等所以父母亡日今為講戒同一切衆生與第一樂故云解其苦難得見諸佛也若不爾下者述曰此第三違制結犯不救衆生苦戒竟如是十戒下至廣明者述曰此是結略指也二十經垢戒竟
